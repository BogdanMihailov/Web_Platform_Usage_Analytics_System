<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auth Admin</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page">
      <main class="content">
        <section id="panel-login" class="panel">
          <div class="hero-card">
            <div class="hero-left">
              <div class="brand-big">WebAnalyzer — Auth</div>
              <h1 class="hero-title">Sign in</h1>
              <p class="hero-desc">Use your admin account to access the management console.</p>
            </div>
            <div class="hero-right">
              <div class="hero-form">
                <div class="field">
                  <input id="username" name="username" autocomplete="username" class="hero-input" />
                  <label for="username">Username</label>
                </div>
                <div class="field">
                  <input id="password" name="password" type="password" autocomplete="current-password" class="hero-input" />
                  <label for="password">Password</label>
                </div>
              </div>
              <div class="hero-cta">
                <button id="btn-login" class="btn primary large">Sign in</button>
              </div>
            </div>
          </div>
        </section>
      </main>

    <script src="/static/main.js"></script>
  </body>
</html>
