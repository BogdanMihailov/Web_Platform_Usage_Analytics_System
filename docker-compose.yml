services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webanalyzer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./tools:/tools:ro
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webanalyzer
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request as u; \
        r=u.urlopen('http://localhost:8000/health'); \
        sys.exit(0 if r.status==200 else 1)\""]
      interval: 10s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_AUTH_URL: http://localhost:8400
      VITE_REALTIME_HOST: localhost

  local-site:
    build: ./local-site
    ports:
      - "5500:8000"
    volumes:
      - ./local-site:/site

  realtime:
    build: ./realtime
    depends_on:
      - backend
    ports:
      - "8700:8700"

  exporter:
    build: ./exporter
    depends_on:
      - db
    ports:
      - "8600:8600"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webanalyzer

  ingestion:
    build: ./ingestion
    depends_on:
      - db
      - realtime
    ports:
      - "8200:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webanalyzer
  processor:
    build: ./processor
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webanalyzer
    restart: on-failure

  alerting:
    build: ./alerting
    depends_on:
      - db
    ports:
      - "8300:8300"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webanalyzer
      # Optional: set ALERT_WEBHOOK_URL to receive JSON POSTs when alerts fire
      # ALERT_WEBHOOK_URL: "http://your-hook.example/"
      CHECK_INTERVAL_SECONDS: "60"
      ALERT_WINDOW_MINUTES: "5"
      BASELINE_WINDOW_MINUTES: "60"
      THRESHOLD_MULTIPLIER: "3.0"
  auth:
    build: ./auth
    depends_on:
      - db
    ports:
      - "8400:8400"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webanalyzer
      FRONTEND_URL: http://localhost:5173
      # Set an admin user (created on first startup if missing)
      AUTH_ADMIN_USER: "admin"
      AUTH_ADMIN_PASSWORD: "admin"
      AUTH_SECRET: "change-me-secret"
      AUTH_LOGIN_MAX_ATTEMPTS: "5"
      AUTH_LOGIN_LOCK_MINUTES: "15"
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: "1440"
      AUTH_PASSWORD_RESET_TTL_MINUTES: "60"
      AUTH_MIN_PASSWORD_LENGTH: "8"
      AUTH_SMTP_HOST: ""
      AUTH_SMTP_PORT: "587"
      AUTH_SMTP_USER: ""
      AUTH_SMTP_PASSWORD: ""
      AUTH_SMTP_FROM: "no-reply@example.com"
      AUTH_SMTP_USE_TLS: "1"

volumes:
  pgdata: